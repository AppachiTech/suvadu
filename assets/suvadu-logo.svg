<svg width="308" height="384" viewBox="0 0 308 384" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="appIconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#001A00"/>
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="50%" stop-color="#00FF41"/>
      <stop offset="100%" stop-color="#008F11"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="26" width="256" height="256" rx="60" fill="url(#iconBg)"/>

  <g filter="url(#appIconGlow)">
    <!-- Hexagonal frame -->
    <path d="M 154 40 L 226 85 L 226 175 L 154 220 L 82 175 L 82 85 Z"
      fill="none" stroke="url(#iconGradient)" stroke-width="6"/>

    <!-- Inner hex -->
    <path d="M 154 70 L 201 97.5 L 201 152.5 L 154 180 L 107 152.5 L 107 97.5 Z"
      fill="rgba(0, 255, 65, 0.1)" stroke="#00FF41" stroke-width="3"/>

    <!-- Terminal prompt symbol: > -->
    <path d="M 121 115 L 146 128 L 121 141"
      stroke="#39FF14" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Terminal cursor line: _ -->
    <line x1="156" y1="141" x2="187" y2="141"
      stroke="#39FF14" stroke-width="5" stroke-linecap="round"/>

    <!-- Decorative dots at hex vertices -->
    <circle cx="154" cy="60" r="3" fill="#39FF14"/>
    <circle cx="211" cy="95" r="3" fill="#39FF14"/>
    <circle cx="211" cy="161" r="3" fill="#39FF14"/>
    <circle cx="154" cy="196" r="3" fill="#39FF14"/>
    <circle cx="97" cy="161" r="3" fill="#39FF14"/>
    <circle cx="97" cy="95" r="3" fill="#39FF14"/>
  </g>

  <!-- "suvadu" wordmark -->
  <text
    x="154"
    y="310"
    font-family="'JetBrains Mono', monospace"
    font-size="52"
    font-weight="700"
    fill="#00CC33"
    text-anchor="middle"
    letter-spacing="-1"
  >suvadu</text>

  <!-- Accent underline -->
  <rect x="54" y="322" width="200" height="3" fill="url(#iconGradient)" rx="1.5"/>
</svg>
